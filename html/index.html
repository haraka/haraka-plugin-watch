<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Haraka Activity</title>
    <script
      src="https://code.jquery.com/jquery-4.0.0.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="/watch/client.js"></script>
    <link rel="stylesheet" href="/watch/watch.css" />
  </head>
  <body>
    <script>
      $(document).ready(() => {
        displayHeaders()
        if (!('WebSocket' in window)) {
          alert('<p>You need a browser that supports WebSockets.</p>')
        } else {
          getConfigAndConnect() // has WebSockets
        }
      })
    </script>

    <div id="dialog-form" title="Log in" style="display: none">
      <p class="validateTips">All form fields are required.</p>
      <form>
        <fieldset>
          <label for="email">Email</label>
          <input
            type="text"
            name="email"
            id="email"
            value=""
            class="text ui-widget-content ui-corner-all"
            placeholder="email"
          />
          <label for="password">Password</label>
          <input
            type="password"
            name="password"
            id="password"
            value=""
            class="text ui-widget-content ui-corner-all"
            placeholder="password"
          />
        </fieldset>
      </form>
    </div>

    <div id="headline">
      <span id="head_right">
        <!-- http://line25.com/tutorials/how-to-create-a-pure-css-dropdown-menu -->
        <nav>
          <ul id="menu">
            <li>
              Menu
              <ul>
                <li>
                  <a onclick="$('div#messages').empty()">Clear Messages</a>
                </li>
                <li><a onclick="resetTable()">Empty Table</a></li>
              </ul>
            </li>
          </ul>
        </nav>
      </span>
      <span id="head_next_right">
        <span id="watchers"></span> watchers.
        <div id="messages"></div>
      </span>
      <span id="head_left">
        <h1>
          Haraka Activity
          <span id="connect_state" title="Click to connect/reconnect"
            >Monitor</span
          >
        </h1>
        <div>Displays in real time. Hover or tap results for more info.</div>
      </span>
    </div>
    <table id="connections">
      <thead>
        <tr id="labels"></tr>
      </thead>
      <tfoot>
        <tr id="helptext"></tr>
      </tfoot>
      <tbody>
        <tr id="connects"></tr>
      </tbody>
    </table>
    <div id="watch-hint-popover" popover="manual"></div>
  </body>
</html>
