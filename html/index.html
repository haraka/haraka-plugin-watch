<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Haraka Activity</title>
    <script
      src="https://code.jquery.com/jquery-4.0.0.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="/watch/client.js"></script>
    <link rel="stylesheet" href="/watch/watch.css" />
  </head>
  <body>
    <div id="headline">
      <span id="head_right">
        <!-- http://line25.com/tutorials/how-to-create-a-pure-css-dropdown-menu -->
        <nav>
          <ul id="menu">
            <li>
              Menu
              <ul>
                <li><a id="menu_clear">Clear Messages</a></li>
                <li><a id="menu_empty">Empty Table</a></li>
              </ul>
            </li>
          </ul>
        </nav>
      </span>
      <span id="head_next_right">
        <span id="watchers"></span> watchers.
        <div id="messages"></div>
      </span>
      <span id="head_left">
        <h1>
          <a
            href="https://github.com/haraka/haraka-plugin-watch"
            target="_blank"
            rel="noopener noreferrer"
            >watch</a
          >, a Haraka Activity
          <span id="connect_state">Monitor</span>
        </h1>
        <div>Displays in real time. Hover or tap results for more info.</div>
      </span>
    </div>
    <table id="connections">
      <thead>
        <tr id="labels"></tr>
      </thead>
      <tfoot>
        <tr id="helptext"></tr>
      </tfoot>
      <tbody>
        <tr id="connects"></tr>
      </tbody>
    </table>
    <div id="watch-hint-popover" popover="manual"></div>
  </body>
</html>
